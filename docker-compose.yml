services:
    db:
        image: postgres:16-alpine
        container_name: discord_event_db
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-bot}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot}
            POSTGRES_DB: ${POSTGRES_DB:-events}
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot}"]
            interval: 5s
            timeout: 5s
            retries: 5

    event-bot:
        build:
            context: .
        container_name: discord_event_bot
        user: "1000:1000"
        restart: always
        env_file:
            - .env
        environment:
            TZ: Europe/Rome
            DATABASE_URL: postgresql://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD:-bot}@db:5432/${POSTGRES_DB:-events}
        depends_on:
            db:
                condition: service_healthy

volumes:
    pgdata:
